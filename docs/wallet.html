<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ZDOS Wallet • BIP39 / HD / Passphrase</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
<nav class="navbar">
  <a href="index.html">Hub</a>
  <a href="wallet.html">Wallet</a>
  <a href="explorer.html">Explorer</a>
  <a href="miner.html">Miner</a>
  <a href="zlang.html">Z‑Lang</a>
  <a href="roadmap.html">Roadmap</a>
  <a href="nodes.html">Nodes</a>
</nav>

<section class="section">
  <h2>Wallet ZDOS • Seed BIP39 + HD + Passphrase</h2>
  <div class="card">

    <label>Numero parole</label>
    <select id="wordCount">
      <option value="12">12 parole</option>
      <option value="24">24 parole</option>
    </select>

    <label style="margin-top:12px;">Passphrase BIP39 (opzionale)</label>
    <input id="passphrase" type="password">

    <label style="margin-top:12px;">Indice account</label>
    <input id="accountIndex" type="number" value="0" min="0">

    <label style="margin-top:12px;">Derivation Path</label>
    <input id="pathInput" type="text" value="m/44'/60'/0'/0/0">

    <button class="btn" id="genSeedBtn" style="margin-top:20px;">Genera nuovo seed + chiavi</button>

    <div id="seedBox" style="display:none;margin-top:20px;">
      <p><strong>Seed BIP39:</strong></p>
      <div id="seedText" class="mono-box"></div>
      <button class="btn" id="copySeedBtn">Copia seed</button>
    </div>

    <div id="keysBox" style="display:none;margin-top:20px;">
      <p><strong>Address:</strong></p>
      <div id="addrText" class="mono-box"></div>

      <p style="margin-top:12px;"><strong>Private Key:</strong></p>
      <div id="privText" class="mono-box"></div>
      <button class="btn" id="copyPrivBtn">Copia private key</button>
    </div>

  </div>
</section>

<footer>
  ZDOS • Wallet BIP39 / HD — high‑cde
</footer>

<script src="assets/libs/bip39.js"></script>
<script src="assets/libs/ethers.js"></script>

<script>
(function(){
  const genBtn = document.getElementById("genSeedBtn");

  function buildPath(base, index) {
    const parts = base.split("/");
    parts[parts.length - 1] = index;
    return parts.join("/");
  }

  async function generate() {
    const wc = parseInt(document.getElementById("wordCount").value);
    const strength = wc === 12 ? 128 : 256;

    const mnemonic = bip39.generateMnemonic(strength);
    const passphrase = document.getElementById("passphrase").value || "";
    const index = parseInt(document.getElementById("accountIndex").value);
    const basePath = document.getElementById("pathInput").value;

    const finalPath = buildPath(basePath, index);

    const hd = ethers.utils.HDNode.fromMnemonic(mnemonic, passphrase).derivePath(finalPath);
    const wallet = new ethers.Wallet(hd.privateKey);

    document.getElementById("seedText").textContent = mnemonic;
    document.getElementById("addrText").textContent = wallet.address;
    document.getElementById("privText").textContent = wallet.privateKey;

    document.getElementById("seedBox").style.display = "block";
    document.getElementById("keysBox").style.display = "block";
  }

  genBtn.onclick = generate;
})();
</script>

</body>
</html>
