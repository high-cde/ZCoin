      background:#000000cc;

      width:100%;

<section class="section">
  <h2>Z‑Lang Terminal • ZDOS% • WASM Stub</h2>
  <div class="card">
    <p>Terminale interattivo ZDOS%. Runtime Z‑Lang collegato a un loader WASM stub. Quando il file <code>assets/js/zlang.wasm</code> sarà pronto, il terminale userà l’engine reale.</p>

    <div id="terminal" class="terminal"></div>

    <div style="margin-top:10px;">
      <span class="prompt">zdos%</span>
      <input id="termInput" class="term-input" autofocus autocomplete="off">
    </div>
  </div>
</section>

<footer>
  ZDOS • Z‑Lang Terminal + WASM stub — high‑cde
</footer>

<script src="assets/js/zlang-runtime.js"></script>
<script>
(function(){
  const term  = document.getElementById('terminal');
  const input = document.getElementById('termInput');

  function print(text, color="#00eaff") {
    const lines = String(text).split("\\n");
    for (const t of lines) {
      const line = document.createElement('div');
      line.style.color = color;
      line.textContent = t;
      term.appendChild(line);
    }
    term.scrollTop = term.scrollHeight;
  }

  async function exec(cmd) {
    const parts = cmd.trim().split(" ");
    const base  = parts[0];

    switch(base) {
      case "help":
        print("Comandi disponibili:");
        print("  help              - mostra i comandi");
        print("  clear             - pulisce il terminale");
        print("  echo [txt]        - stampa testo");
        print("  zlang [code]      - esegue codice Z-Lang via runtime");
        print("  sys.info          - info runtime Z-Lang (via WASM stub)");
        print("  wallet.new        - genera chiave mock via Z-Lang runtime");
        print("  miner.test        - test PoW mock via Z-Lang runtime");
        break;

      case "clear":
        term.innerHTML = "";
        break;

      case "echo":
        print(parts.slice(1).join(" "));
        break;

      case "zlang":
        const code = parts.slice(1).join(" ");
        if (!code) { print("Uso: zlang [codice]"); break; }
        try {
          const out = await ZLangRuntime.run(code);
          print(out, "#00ffc3");
        } catch (e) {
          print("Errore runtime Z-Lang: " + e.message, "#ff4b81");
        }
        break;

      case "sys.info":
        try {
          const out = await ZLangRuntime.sysInfo();
          print(out, "#00ffc3");
        } catch (e) {
          print("Errore sys.info: " + e.message, "#ff4b81");
        }
        break;

      case "wallet.new":
        try {
          const w = await ZLangRuntime.walletNew();
          print("Private key (mock):", "#00ffc3");
          print(w.privateKey, "#00ffc3");
          print(w.note, "#9a9ab0");
        } catch (e) {
          print("Errore wallet.new: " + e.message, "#ff4b81");
        }
        break;

      case "miner.test":
        try {
          const out = await ZLangRuntime.minerTest();
          print(out, "#00ffc3");
        } catch (e) {
          print("Errore miner.test: " + e.message, "#ff4b81");
        }
        break;

      default:
        print("Comando non riconosciuto: " + base, "#ff4b81");
    }
  }

  input.addEventListener("keydown", async (e)=>{
    if (e.key === "Enter") {
      const cmd = input.value.trim();
      if (!cmd) return;
      print("zdos% " + cmd, "#00ffc3");
      await exec(cmd);
      input.value = "";
    }
  });

  print("ZDOS% Terminal pronto.");
  print("Digita 'help' per i comandi.");
  print("Quando zlang.wasm sarà collegato, il runtime passerà da MOCK a REALE.");
})();
</script>
