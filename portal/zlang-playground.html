<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Z‑Lang Playground</title>
  <link rel="stylesheet" href="assets/css/zdos.css" />
</head>
<body>
  <div class="zdos-shell">
    <header class="zdos-header">
      <div>
        <div class="zdos-brand">Z‑LANG // PLAYGROUND</div>
        <div class="zdos-sub">Mock runtime per script Z‑Lang</div>
      </div>
    </header>

    <nav class="zdos-nav">
      <a href="index.html">home</a>
      <a href="dashboard.html">dashboard</a>
      <a href="explorer.html">explorer</a>
      <a href="hl0-console.html">hl0 console</a>
      <a href="zlang-playground.html" class="active">z‑lang playground</a>
    </nav>

    <section class="zdos-panel">
      <h1 class="zdos-title">Playground</h1>
      <p class="zdos-muted">
        Qui potrai in futuro eseguire script Z‑Lang collegati a HyperLayer0.
        Per ora è un mock editor.
      </p>

      <textarea id="zlang-editor" style="width:100%;height:200px;background:#02040a;color:#e5ffe5;border:1px solid #00ff7f;font-family:monospace;font-size:0.8rem;padding:8px;">
module HyperUniverse::Test {
  fn main() {
    log("hello from z-lang playground");
  }
}
      </textarea>

      <button class="zdos-btn zdos-btn-primary" id="btn-run">esegui (mock)</button>

      <div class="zdos-console" id="zlang-log" style="margin-top:10px;"></div>
    </section>
  </div>

  <script>
    document.getElementById("btn-run").addEventListener("click", () => {
      const code = document.getElementById("zlang-editor").value;
      const log = document.getElementById("zlang-log");
      log.innerHTML = "";
      const lines = code.split("\n");
      lines.forEach((l) => {
        const div = document.createElement("div");
        div.textContent = "[Z-LANG] " + l;
        log.appendChild(div);
      });
      const div = document.createElement("div");
      div.textContent = "[Z-LANG] (mock) esecuzione completata.";
      log.appendChild(div);
    });
  </script>
</body>
</html>
